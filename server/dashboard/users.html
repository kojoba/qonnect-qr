<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users</title>
    <link rel="stylesheet" href="/dashboard/css/style.css" />
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge">QQ</div>
          <div class="brand-text">
            <h2>Qonnect QR</h2>
            <p>Admin Dashboard</p>
          </div>
        </div>

        <div class="nav-section">
          <p class="nav-title">Management</p>
          <div class="nav-links">
            <a class="nav-link" href="/dashboard/index.html">Overview</a>
            <a class="nav-link active" href="/dashboard/users.html">Users</a>
            <a class="nav-link" href="/dashboard/tiers.html">Card Tiers</a>
            <a class="nav-link" href="/dashboard/cards.html">Cards</a>
            <a class="nav-link" href="/dashboard/contacts.html">Contacts</a>
            <a class="nav-link" href="/dashboard/qrcodes.html">QR Codes</a>
            <a class="nav-link" href="/dashboard/analytics.html">Analytics</a>
            <a class="nav-link" id="staffNavLink" href="/dashboard/staff.html">Staff</a>
            <a class="nav-link" href="/dashboard/audit-logs.html" id="auditNavLink">Audit Logs</a>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="page-heading">
            <h1>Users</h1>
            <p>Create and manage people assigned to digital cards.</p>
          </div>

          <div class="topbar-actions">
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
          </div>
        </div>

        <div class="layout-grid">
          <section class="panel">
            <h2>Create User</h2>
            <p class="panel-subtitle">Add a new person into the system.</p>

            <form id="userForm" class="form-grid">
              <div class="form-row">
                <div>
                  <label>First Name</label>
                  <input type="text" name="first_name" required />
                </div>
                <div>
                  <label>Last Name</label>
                  <input type="text" name="last_name" required />
                </div>
              </div>

              <div class="form-row">
                <div>
                  <label>Email</label>
                  <input type="email" name="email" />
                </div>
                <div>
                  <label>Phone</label>
                  <input type="text" name="phone" />
                </div>
              </div>

              <input type="hidden" name="id" />

              <div class="form-row">
                <div>
                  <label>Job Title</label>
                  <input type="text" name="job_title" />
                </div>
                <div>
                  <label>Department</label>
                  <input type="text" name="department" />
                </div>
              </div>

              <div class="form-row">
                <div>
                  <label>Company Name</label>
                  <input type="text" name="company_name" />
                </div>
                <div>
                  <label>Status</label>
                  <input type="text" name="status" value="active" />
                </div>
              </div>

              <div class="record-actions">
                <button
                  class="btn btn-primary"
                  type="submit"
                  id="userSubmitBtn"
                >
                  Create User
                </button>
                <button
                  class="btn btn-secondary"
                  type="button"
                  id="userCancelBtn"
                  style="display: none"
                >
                  Cancel Edit
                </button>
              </div>
            </form>
          </section>

          <section class="panel">
            <h2>All Users</h2>
            <p class="panel-subtitle">Recently created users in the system.</p>

            <div class="toolbar">
              <input
                type="text"
                id="userSearch"
                class="search-input"
                placeholder="Search by name, email, phone..."
              />
              <select id="userStatusFilter" class="filter-select">
                <option value="">All Statuses</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="suspended">Suspended</option>
              </select>
            </div>
            <div id="usersList" class="records"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/dashboard/js/hide.js"></script>
    <script src="/dashboard/js/auth.js"></script>
    <script src="/dashboard/js/ui.js"></script>
    <script src="/dashboard/js/modal.js"></script>
    <script>
      requireAuth();
    </script>
    <script src="/dashboard/js/users.js"></script>
  </body>
</html>
